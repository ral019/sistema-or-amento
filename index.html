
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema de Orçamento Profissional</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#002137">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/3JZGkGVs/Whats-App-Image-2026-02-20-at-13-13-16.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            -webkit-font-smoothing: antialiased;
        }

        /* Estilos de Impressão e Captura */
        @media print {
            @page {
                size: A4;
                margin: 10mm;
            }
            body {
                background-color: white !important;
                margin: 0 !important;
                padding: 0 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .no-print {
                display: none !important;
            }
            #quote-container {
                box-shadow: none !important;
                border: 1px solid #e2e8f0 !important;
                width: 100% !important;
                max-width: 100% !important;
                margin: 0 !important;
                border-radius: 0 !important;
                display: block !important;
            }

            /* Forçar Grid de 4 Colunas nos Dados do Cliente */
            .client-grid {
                display: grid !important;
                grid-template-columns: repeat(4, 1fr) !important;
                gap: 0.75rem !important;
            }
            .client-grid > .col-span-2 {
                grid-column: span 2 / span 2 !important;
            }

            /* Estabilização do Cabeçalho */
            header {
                display: flex !important;
                flex-direction: row !important;
                align-items: center !important;
                justify-content: space-between !important;
                width: 100% !important;
                padding: 20px !important;
                background-color: #002137 !important;
            }
            .header-right-side {
                display: flex !important;
                flex-direction: column !important;
                align-items: flex-end !important;
                text-align: right !important;
                min-width: 180px !important;
                border-left: 1px solid rgba(255,255,255,0.2) !important;
            }

            /* CORREÇÃO CRÍTICA: Manter texto branco no cabeçalho escuro */
            header label {
                color: rgba(255, 255, 255, 0.6) !important;
            }
            header input {
                color: white !important;
                font-weight: 900 !important;
                text-align: right !important;
                background: transparent !important;
            }

            /* Ajuste de Itens e Rodapé */
            .item-row {
                display: flex !important;
                flex-direction: row !important;
                border-bottom: 1px solid #f1f5f9 !important;
                padding-bottom: 10px !important;
            }
            .footer-row {
                display: flex !important;
                flex-direction: row !important;
                gap: 20px !important;
            }

            input, textarea {
                border: none !important;
                background: transparent !important;
                padding: 0 !important;
                box-shadow: none !important;
                color: #1e293b;
            }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
<script>
    if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
            navigator.serviceWorker.register("/sw.js")
                .then(reg => console.log("Service Worker registrado com sucesso!", reg))
                .catch(err => console.error("Erro ao registrar Service Worker:", err));
        });
    }
</script>
</body>
</html>
